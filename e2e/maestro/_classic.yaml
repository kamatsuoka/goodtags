appId: com.fogcitysingers.goodtags
---
# Fragment: classic tags
# Entry/Exit: home screen (home tab)

- tapOn:
    id: "classic"
- takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-classic-01-main

- runFlow:
    file: _collection.yaml
    env:
        NAME: classic
        SEQ: ${SEQ}

- tapOn:
    text: "tab_home"
