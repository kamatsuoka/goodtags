appId: com.fogcitysingers.goodtags
---
# Fragment: search screenshots
# Entry: tab bar visible (any tab)
# Exit: search tab

# search form
- tapOn:
    text: "tab_search"
- takeScreenshot: ${SCREENSHOT_DIR}/09a-search-form

# search results
- tapOn:
    id: search_input
- inputText: "moonlight"
- pressKey: Enter
- takeScreenshot: ${SCREENSHOT_DIR}/09b-search-results

# revise search
- tapOn:
    text: moonlight
- takeScreenshot: ${SCREENSHOT_DIR}/09c-revise-search-form
- tapOn:
    text: "4"
- tapOn:
    text: tracks
- tapOn:
    text: classic
- takeScreenshot: ${SCREENSHOT_DIR}/09d-revised-search-options
- tapOn:
    id: search_input
- pressKey: Enter
- takeScreenshot: ${SCREENSHOT_DIR}/09e-revised-search-results

# new search
- tapOn:
    text: new search    
- takeScreenshot: ${SCREENSHOT_DIR}/09f-new-saerch
    