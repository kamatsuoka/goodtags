appId: com.fogcitysingers.goodtags
---
- launchApp:
    clearState: true

# 01 - welcome screen
- assertVisible:
    id: welcome_forward_button
- takeScreenshot: ${SCREENSHOT_DIR}/01-welcome-screen

# 02 - home screen
- tapOn:
    id: welcome_forward_button
- assertVisible:
    id: home_container
- takeScreenshot: ${SCREENSHOT_DIR}/02-home-screen

# 03 - popular tags list
- waitForAnimationToEnd
- tapOn:
    id: "popular"
- waitForAnimationToEnd
- takeScreenshot: ${SCREENSHOT_DIR}/03-popular-tags

# 04-04j - tag screen interactions (enters from popular list, exits on home tab)
- runFlow: _tag-screen.yaml

# 05-07 - collections: classic, easy, new (home tab → home tab)
- runFlow: _collections.yaml

# 07b-07c - random tag (home tab → home tab)
- runFlow: _random-tag.yaml

# 08 - labels
- runFlow: _labels.yaml

# 09-10 - search
- runFlow: _search.yaml

# 11 - favorites (has the tag favorited in 04b)
- tapOn:
    text: "tab_faves"
- waitForAnimationToEnd
- takeScreenshot: ${SCREENSHOT_DIR}/11-favorites

# 12 - history
- tapOn:
    text: "tab_history"
- waitForAnimationToEnd
- takeScreenshot: ${SCREENSHOT_DIR}/12-history
- tapOn:
    text: "tab_home"
- waitForAnimationToEnd

# 13-13c - options screen (home tab → home tab)
- runFlow: _options.yaml

