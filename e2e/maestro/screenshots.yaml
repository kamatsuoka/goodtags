appId: com.fogcitysingers.goodtags
---
- launchApp:
    clearState: true

# welcome screen
- assertVisible:
    id: welcome_forward_button
- takeScreenshot: ${SCREENSHOT_DIR}/01-welcome-screen

# home screen
- tapOn:
    id: welcome_forward_button
- assertVisible:
    id: home_container
- takeScreenshot: ${SCREENSHOT_DIR}/02-home-screen

# labels
- runFlow:
    file: _labels.yaml
    env:
        SEQ: 03

# 03-04 - popular tags list and tag screen interactions
- runFlow: _popular.yaml

# 05 - classic tags
- runFlow:
    file: _classic.yaml
    env:
        SEQ: 05

# 06 - easy tags
- runFlow:
    file: _easy.yaml
    env:
        SEQ: 06

# 05-07 - collections: classic, easy, new 
- runFlow: _collections.yaml

# 07b-07c - random tag 
- runFlow: _random-tag.yaml

# 09-10 - search
- runFlow: _search.yaml

# 11 - favorites (has the tag favorited in 04b)
- tapOn:
    text: "tab_faves"
- takeScreenshot: ${SCREENSHOT_DIR}/11-favorites

# 12 - history
- tapOn:
    text: "tab_history"
- takeScreenshot: ${SCREENSHOT_DIR}/12-history
- tapOn:
    text: "tab_home"

# 13-13c - options screen 
- runFlow: _options.yaml

# 14 - backup
- runFlow: _backup.yaml

# 15 - remove favorites
- runFlow: _remove-favorites.yaml

# 16 - remove labels
- runFlow: _remove-labels.yaml

# 17 - restore
- runFlow: _restore.yaml

# 18 - favorites restored
- tapOn:
    text: "tab_faves"
- takeScreenshot: ${SCREENSHOT_DIR}/18-favorites-restored
- tapOn:
    text: "tab_home"

# 19 - labels restored 
- tapOn:
    id: "labels"
- takeScreenshot: ${SCREENSHOT_DIR}/19-labels-restored
