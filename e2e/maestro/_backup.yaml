appId: com.fogcitysingers.goodtags
---
# Fragment: backup
# Entry/Exit: home screen (home tab)

- tapOn:
    id: "data"
- takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-backup-01-data

- tapOn:
    id: "backup"
    delay: 2000
- takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-backup-02-backup-clicked

# Android-specific saving flow
- runFlow:
    when:
        platform: Android
    commands:
        # saveDocuments() opens a system "Save As" dialog (ACTION_CREATE_DOCUMENT);
        - tapOn:
            point: "50%, 95%"
            repeat: 2
            delay: 1000
        - takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-backup-03-file-selector
        - eraseText: 50
        - inputText: "faves-labels-maestro-${runId}"
        - takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-backup-04-filename-entered
        - pressKey: Enter
        - waitForAnimationToEnd
        - takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-backup-05-backed-up

# iOS-specific saving flow
- runFlow:
    when:
        platform: iOS
    commands:
        # maestro doesn't see "Save to Files" button, find it by location
        - tapOn:
            point: "30%, 90%"
            repeat: 2
            delay: 1000
        - takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-backup-03-file-selector
        - tapOn:
            point: "50%, 95%"
            delay: 1000
        - eraseText: 50
        - inputText: "faves-labels-maestro-${runId}"
        - takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-backup-04-filename-entered
        - pressKey: Enter
        - waitForAnimationToEnd
        - tapOn:
            point: "85%, 13%"
            delay: 1000
        - takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-backup-05-backed-up

- tapOn:
    id: back_button
- waitForAnimationToEnd
