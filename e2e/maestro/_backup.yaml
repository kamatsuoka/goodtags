appId: com.fogcitysingers.goodtags
---
# Fragment: backup
# Entry: home screen (home tab)
# Exit: home screen (home tab)

# 14 - data screen (default state)
- tapOn:
    id: "data"
- takeScreenshot: ${SCREENSHOT_DIR}/14a-data

# 14a - backup button
- tapOn:
    id: "backup"
    delay: 2000
- takeScreenshot: ${SCREENSHOT_DIR}/14b-data-backup

# 14b - Android-specific saving flow
- runFlow:
    when:
        platform: Android
    commands:
        # no "save to files" available in android, just dismiss 
        - tapOn:
            point: "10%, 10%"

# 14 etc - iOS-specific saving flow
- runFlow:
    when:
        platform: iOS
    commands:
        # maestro doesn't see "Save to Files" button, find it by location
        - tapOn:
            point: "30%, 90%"
            repeat: 2
            delay: 1000
        - takeScreenshot: ${SCREENSHOT_DIR}/14c-data-file-selector
        - tapOn:
            point: "50%, 95%"
            delay: 1000
        - eraseText: 50
        - inputText: "faves-labels-maestro-${runId}"
        - takeScreenshot: ${SCREENSHOT_DIR}/14d-data-filename-entered
        - pressKey: Enter
        - waitForAnimationToEnd
        - tapOn: 
            point: "85%, 13%"
            delay: 1000
        - takeScreenshot: ${SCREENSHOT_DIR}/14e-data-backed-up

- tapOn:
    id: back_button
- waitForAnimationToEnd
