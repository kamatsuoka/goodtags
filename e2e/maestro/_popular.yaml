appId: com.fogcitysingers.goodtags
---
# Fragment: popular tags
# Entry/Exit: home screen (home tab)

- tapOn:
    id: "popular"
- takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-popular-01-main

- runFlow:
    file: _collection.yaml
    env:
        NAME: popular
        SEQ: ${SEQ}

- tapOn:
    text: "tab_home"
