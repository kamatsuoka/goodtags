appId: com.fogcitysingers.goodtags
---
# Fragment: popular tags and tag screen interactions
# Entry: home tab (home screwen)
# Exit: home tab (home screen)

- tapOn:
    id: "popular"
- takeScreenshot: ${SCREENSHOT_DIR}/03-popular-tags

# 04 - sheet music (tap first tag in popular list)
- tapOn:
    id: "title_.*"
    index: 0
- extendedWaitUntil:
    visible:
      id: sheet_music_loaded
    timeout: 30000
- waitForAnimationToEnd
- takeScreenshot: ${SCREENSHOT_DIR}/04-sheet-music

# 04a - next tag
- tapOn:
    id: "tag_next"
- extendedWaitUntil:
    visible:
      id: sheet_music_loaded
    timeout: 30000
- waitForAnimationToEnd
- takeScreenshot: ${SCREENSHOT_DIR}/04a-sheet-music-next

# back to original tag
- tapOn:
    id: "tag_prev"
- extendedWaitUntil:
    visible:
      id: sheet_music_loaded
    timeout: 30000
- waitForAnimationToEnd

# 04b - tap heart to add to favorites
- tapOn:
    id: "tag_favorite"
- takeScreenshot: ${SCREENSHOT_DIR}/04b-sheet-music-favorited

# 04c - open FAB menu
- tapOn:
    id: "tag_menu"
- takeScreenshot: ${SCREENSHOT_DIR}/04c-tag-menu

# 04d - tag info bottom sheet
- tapOn:
    id: "fab_tag_info"
- takeScreenshot: ${SCREENSHOT_DIR}/04d-tag-info
- tapOn:
    point: "50%, 10%"

# 04e - labels screen (TagLabels)
- tapOn:
    id: "tag_menu"
- tapOn:
    id: "fab_labels"
- takeScreenshot: ${SCREENSHOT_DIR}/04e-tag-labels

# 04f/04g - create label "first"
- tapOn:
    text: "new label"
- inputText: "first"
- takeScreenshot: ${SCREENSHOT_DIR}/04f-create-label
- pressKey: Enter
- takeScreenshot: ${SCREENSHOT_DIR}/04g-tag-labels-first
- tapOn:
    id: back_button

# 04h - tracks bottom sheet
- tapOn:
    id: "tag_menu"
- tapOn:
    id: "fab_tracks"
- takeScreenshot: ${SCREENSHOT_DIR}/04h-tracks
- tapOn:
    point: "50%, 10%"

# 04i/04j - videos
- tapOn:
    id: "tag_menu"
- tapOn:
    id: "fab_videos"
- waitForAnimationToEnd
- assertVisible:
    text: "Play video"
- takeScreenshot: ${SCREENSHOT_DIR}/04i-videos
- swipe:
    start: "75%, 55%"
    end: "25%, 55%"
- waitForAnimationToEnd
- assertVisible:
    text: "Play video"
- takeScreenshot: ${SCREENSHOT_DIR}/04j-videos-next
- tapOn:
    id: back_button

# back to popular list, then home tab (tapping active tab resets to root)
- tapOn:
    id: back_button
- tapOn:
    text: "tab_home"
