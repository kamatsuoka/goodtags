appId: com.fogcitysingers.goodtags
---
# Fragment: labels screen screenshots
# Entry: home screen (home tab)
# Exit: home screen (home tab)

# labels screen
- tapOn:
    id: "labels"
- takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-01-labels

# create label 'first'
- tapOn:
    text: "new"
- inputText: "first"
- takeScreenshot: ${SCREENSHOT_DIR}/08b-create-label-first
- pressKey: Enter

# create label 'low'
- tapOn:
    text: "new"
- inputText: "low"
- takeScreenshot: ${SCREENSHOT_DIR}/08a-create-label-low
- pressKey: Enter

# 08c/08d - label editor: rename 'low' to 'lower'
- tapOn:
    text: "edit"
- takeScreenshot: ${SCREENSHOT_DIR}/08c-label-editor
- tapOn:
    id: label_pencil_low
- inputText: "er"
- takeScreenshot: ${SCREENSHOT_DIR}/08d-rename-label
- pressKey: Enter

# 08e/08f - drag 'mid' below 'first'
- takeScreenshot: ${SCREENSHOT_DIR}/08e-label-editor-renamed
- swipe:
    start: "90%, 16%"
    end: "90%, 22%"
    duration: 2500
- takeScreenshot: ${SCREENSHOT_DIR}/08f-label-reordered
- tapOn:
    id: back_button

- tapOn:
    id: back_button

- tapOn:
    text: "tab_home"
