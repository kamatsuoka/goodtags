appId: com.fogcitysingers.goodtags
---
# Fragment: labels screen screenshots
# Entry: home screen (home tab)
# Exit: home screen (home tab)

# labels screen
- tapOn:
    id: labels
- takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-labels-01-main

# create label 'DELETEME'
- tapOn:
    id: labels_new
- inputText: DELETEME
- takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-labels-02-create-deleteme
- pressKey: Enter

# delete label 'DELETEME'
- tapOn:
    id: labels_edit
- tapOn:
    id: label_pencil_DELETEME
- takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-labels-02-editing-deleteme
- tapOn:
    id: label_trash_DELETEME
- takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-labels-02-delete-confirm
- tapOn:
    id: delete_label_confirm
- takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-labels-02-deleted-deleteme
# exit edit mode
- tapOn:
    id: back_button

# create label 'first'
- tapOn:
    id: labels_new
- waitForAnimationToEnd
- inputText: first
- takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-labels-02-create-first
- pressKey: Enter

# create label 'low'
- tapOn:
    id: labels_new
- inputText: low
- takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-labels-03-create-low
- pressKey: Enter

# label editor: rename 'low' to 'lower'
- tapOn:
    id: labels_edit
- takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-labels-04-editor
- tapOn:
    id: label_pencil_low
- inputText: er
- takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-labels-05-rename
- pressKey: Enter

# drag 'mid' below 'first'
- takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-labels-06-editor-renamed
- swipe:
    start: "90%, 16%"
    end: "90%, 22%"
    duration: 2500
- takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-labels-07-reordered
# exit edit mode
- tapOn:
    id: back_button

# back to home screen
- tapOn:
    id: back_button
- tapOn:
    text: tab_home
