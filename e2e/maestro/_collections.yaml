appId: com.fogcitysingers.goodtags
---
# Fragment: collection list screenshots (classic, easy, new)
# Entry: home screen (home tab)
# Exit: home screen (home tab)

# 05 - classic tags
- tapOn:
    id: "classic"
- waitForAnimationToEnd
- takeScreenshot: ${SCREENSHOT_DIR}/05-classic-tags

# 06 - easy tags
- tapOn:
    text: "home, tab, 1 of 4"
- tapOn:
    id: "easy"
- waitForAnimationToEnd
- takeScreenshot: ${SCREENSHOT_DIR}/06-easy-tags

# 06a/06b - first easy tag, add to favorites
- tapOn:
    id: "title_.*"
    index: 0
- extendedWaitUntil:
    visible:
      id: sheet_music_loaded
    timeout: 30000
- waitForAnimationToEnd
- takeScreenshot: ${SCREENSHOT_DIR}/06a-easy-sheet-music
- tapOn:
    id: "icon-button"
    index: 0
- waitForAnimationToEnd
- takeScreenshot: ${SCREENSHOT_DIR}/06b-easy-sheet-music-favorited
- tapOn:
    id: back_button
- waitForAnimationToEnd

# 07 - new tags
- tapOn:
    text: "home, tab, 1 of 4"
- tapOn:
    id: "new"
- waitForAnimationToEnd
- takeScreenshot: ${SCREENSHOT_DIR}/07-new-tags
- tapOn:
    text: "home, tab, 1 of 4"
