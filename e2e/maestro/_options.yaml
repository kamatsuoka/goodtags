appId: com.fogcitysingers.goodtags
---
# Fragment: options screen screenshots
# Entry/Exit: home screen (home tab)

- tapOn:
    id: "options"
- waitForAnimationToEnd
- takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-options-01-main

# serifs toggled off
- tapOn:
    id: "option_serifs"
- waitForAnimationToEnd
- takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-options-02-serifs-off
- tapOn:
    id: "option_serifs"
- waitForAnimationToEnd

# status bar toggled on
- tapOn:
    id: "option_status_bar"
- waitForAnimationToEnd
- takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-options-03-status-bar-on
- tapOn:
    id: "option_status_bar"
- waitForAnimationToEnd

# keep awake toggled off
- tapOn:
    id: "option_keep_awake"
- waitForAnimationToEnd
- takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-options-04-keep-awake-off
- tapOn:
    id: "option_keep_awake"
- waitForAnimationToEnd

- tapOn:
    id: back_button
- waitForAnimationToEnd
