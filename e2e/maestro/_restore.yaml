appId: com.fogcitysingers.goodtags
---
# Fragment: restore
# Entry/Exit: home screen (home tab)

- tapOn:
    id: "data"
- takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-restore-01-data

- tapOn:
    id: "restore"
    repeat: 2
    delay: 1000
- waitForAnimationToEnd
- takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-restore-02-restore-clicked

# Android-specific flow
- runFlow:
    when:
        platform: Android
    commands:
        # no local files available in android, just dismiss
        - tapOn:
            point: "10%, 10%"

# iOS-specific restore flow
- runFlow:
    when:
        platform: iOS
    commands:
      - tapOn:
            point: "15%, 30%"
            delay: 1000
      - waitForAnimationToEnd
      - takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-restore-03-restored

- tapOn:
    id: back_button
- waitForAnimationToEnd
