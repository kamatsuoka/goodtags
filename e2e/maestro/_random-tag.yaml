appId: com.fogcitysingers.goodtags
---
# Fragment: random tag screenshots
# Entry/Exit: home screen (home tab)

- tapOn:
    id: "random tag"
- extendedWaitUntil:
    visible:
      id: sheet_music_loaded
    timeout: 30000
- waitForAnimationToEnd
- takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-random-tag-01-main

# shuffled random tag
- tapOn:
    id: "tag_shuffle"
- extendedWaitUntil:
    visible:
      id: sheet_music_loaded
    timeout: 30000
- waitForAnimationToEnd
- takeScreenshot: ${SCREENSHOT_DIR}/${SEQ}-random-tag-02-shuffled
- tapOn:
    id: back_button
- tapOn:
    text: "tab_home"
